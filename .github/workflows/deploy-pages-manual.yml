name: Deploy Flutter Web (manual)

on:
  workflow_dispatch:
    inputs:
      PUBLIC_API_URL:
        description: 'Public API base URL (e.g. https://mi-backend.onrender.com/api)'
        required: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.7.0'

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze || true

      - name: Run tests
        run: flutter test --no-pub || true

      - name: Build web with provided API URL
        run: |
          echo "Building web with API_BASE_URL=${{ github.event.inputs.PUBLIC_API_URL }}"
          flutter build web --release \
            --dart-define=API_BASE_URL=${{ github.event.inputs.PUBLIC_API_URL }} \
            --base-href /barberia-flutter-app/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
